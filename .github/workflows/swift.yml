---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    # Not macos-latest: that pool currently mixes macOS 15 and 26 images, and on
    # macOS 15 test bundles built by Xcode 26's Swift fail to dlopen
    # (@rpath/libswiftCompatibilitySpan.dylib); the macOS 26 runtime ships it.
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      # macos-latest's default Xcode ships an older Swift that can't read
      # swift-subprocess 0.5.0's `swift-tools-version: 6.2` manifest (it's trait-gated
      # but SwiftPM still resolves it), which fails resolution. Pin a newer Xcode.
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build
      # The default trait set compiles JSONRPCSubprocess (and its tests) to an
      # empty module, so a separate leg builds and tests with the trait enabled.
      - name: Build (macOS, Subprocess trait)
        run: swift build --build-tests -v --traits Subprocess
      - name: Test (macOS, Subprocess trait)
        run: swift test -v --skip-build --traits Subprocess

  build-ios:
    # macos-26 for the same runner-pool reason as build-macos.
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      # Xcode 26 ships SDKs/runtimes as downloadable components; the hosted runner
      # image no longer bundles the iOS platform, so a `generic/platform=iOS` build
      # fails with "iOS 26.0 is not installed" until we fetch it.
      - name: Download iOS platform
        run: xcodebuild -downloadPlatform iOS
      - name: Build (iOS)
        run: xcodebuild -scheme JSONFoundation -destination 'generic/platform=iOS' build

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build (Windows)
        run: swift build --build-tests -v
      - name: Test (Windows)
        run: swift test -v --skip-build

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Cross-compiling the macro test target trips swiftlang/swift-package-manager#8094
    # (missing index-store unit); this drops that host-only target from the graph.
    env:
      JSONFOUNDATION_SKIP_MACRO_TESTS: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Build & test (Android emulator)
        timeout-minutes: 25
        uses: skiptools/swift-android-action@v2
        with:
          # Match the Windows job's toolchain; the Android action had no SDK snapshot
          # for 6.3.2 ("Could not find any swift version matching: 6.3.2").
          swift-version: "6.3.1"
          free-disk-space: true
